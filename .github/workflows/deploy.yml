name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEFAULT_APP_DIR: /var/www/mock-preliminary-task
      DEFAULT_APP_PORT: "8080"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm test

      - name: Package release
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='*.log' \
            -czf "$RUNNER_TEMP/release.tar.gz" .

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Missing SERVER_HOST secret}"
          : "${SERVER_SSH_KEY:?Missing SERVER_SSH_KEY secret}"
          SERVER_PORT="${SERVER_PORT:-22}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Copy release to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Missing SERVER_HOST secret}"
          : "${SERVER_USER:?Missing SERVER_USER secret}"
          SERVER_PORT="${SERVER_PORT:-22}"

          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" "$RUNNER_TEMP/release.tar.gz" "$SERVER_USER@$SERVER_HOST:/tmp/mock-preliminary-task-release.tar.gz"

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          APP_PORT: ${{ secrets.APP_PORT }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Missing SERVER_HOST secret}"
          : "${SERVER_USER:?Missing SERVER_USER secret}"
          : "${MONGODB_URI:?Missing MONGODB_URI secret}"
          : "${SESSION_SECRET:?Missing SESSION_SECRET secret}"

          SERVER_PORT="${SERVER_PORT:-22}"
          APP_DIR="${SERVER_APP_DIR:-$DEFAULT_APP_DIR}"
          APP_PORT="${APP_PORT:-$DEFAULT_APP_PORT}"
          ENV_FILE_B64="$(printf 'NODE_ENV=production\nPORT=%s\nMONGODB_URI=%s\nSESSION_SECRET=%s\n' "$APP_PORT" "$MONGODB_URI" "$SESSION_SECRET" | base64 -w0)"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "APP_DIR='$APP_DIR' ENV_FILE_B64='$ENV_FILE_B64' RELEASE_FILE='/tmp/mock-preliminary-task-release.tar.gz' bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "$APP_DIR"
          tar -xzf "$RELEASE_FILE" -C "$APP_DIR"
          cd "$APP_DIR"

          printf '%s' "$ENV_FILE_B64" | base64 -d > .env
          chmod 600 .env

          npm ci --omit=dev

          if ! command -v pm2 >/dev/null 2>&1; then
            npm install --global pm2
          fi

          pm2 startOrReload ecosystem.config.cjs --env production
          pm2 save

          rm -f "$RELEASE_FILE"
          EOF
